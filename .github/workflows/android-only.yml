name: Android APK Only

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/android-only.yml'
      - 'src/**'
      - 'flutter/**'
      - 'libs/**'

env:
  RUST_VERSION: "1.75"
  CARGO_NDK_VERSION: "3.1.2"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r28c"
  VERSION: "1.4.8"



jobs:
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: "stable"
          flutter-version: "3.24.5"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake curl git g++ \
            libclang-dev llvm-dev pkg-config

      - name: Generate bridge
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --locked
          cd flutter
          sed -i 's/extended_text: .*/extended_text: 13.0.0/' pubspec.yaml
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ..
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --class-name RustdeskImpl

      - name: Upload bridge artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bridge-artifact
          path: |
            flutter/lib/generated_bridge.dart
            flutter/lib/generated_bridge.freezed.dart
            src/bridge_generated.rs
            src/bridge_generated.io.rs

  build-android:
    needs: [generate-bridge]
    name: Build Android APK aarch64
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-artifact
          path: ./

      - name: Fix RustdeskImpl instantiation
        run: |
          sed -i 's/RustdeskImpl(dylib)/RustdeskImplImpl(dylib)/g' \
            flutter/lib/models/native_model.dart

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake curl gcc-multilib git g++ g++-multilib \
            libayatana-appindicator3-dev libasound2-dev libc6-dev \
            libclang-dev libunwind-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev libgtk-3-dev libpam0g-dev \
            libpulse-dev libva-dev libxcb-randr0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxdo-dev libxfixes-dev llvm-dev nasm \
            ninja-build openjdk-17-jdk-headless pkg-config wget

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: "stable"
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}

      - uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg /opt/vcpkg
          cd /opt/vcpkg
          git checkout 120deac3062162151622ca4860575a33844ba10b
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=/opt/vcpkg" >> $GITHUB_ENV

      - name: Build Android dependencies with vcpkg
        run: |
          chmod +x ./flutter/build_android_deps.sh
          ./flutter/build_android_deps.sh arm64-v8a

      - name: Build rustdesk lib
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
          cargo ndk -t aarch64-linux-android build --release --lib --features flutter
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so \
             ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

      - name: Download missing resources from RustDesk official
        run: |
          python3 << 'PYEOF'
          import struct, zlib, os, shutil

          def make_png(w, h, color):
              def chunk(t, d):
                  c = zlib.crc32(t + d) & 0xffffffff
                  return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
              raw = b''.join(b'\x00' + bytes(color) * w for _ in range(h))
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) +
                      chunk(b'IDAT', zlib.compress(raw)) +
                      chunk(b'IEND', b''))

          sizes = [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96),
                   ('mipmap-xxhdpi', 144), ('mipmap-xxxhdpi', 192)]

          for dirname, size in sizes:
              path = f'flutter/android/app/src/main/res/{dirname}'
              os.makedirs(path, exist_ok=True)
              launcher = f'{path}/ic_launcher.png'
              with open(launcher, 'wb') as f:
                  f.write(make_png(size, size, [25, 118, 210]))
              shutil.copy(launcher, f'{path}/ic_launcher_round.png')

          PYEOF

          rm -f flutter/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f flutter/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Fix Kotlin resources
        run: |
          sed -i \
            -e 's/R\.mipmap\.ic_stat_logo/R.mipmap.ic_launcher/g' \
            -e 's/\.setDefaults(Notification\.DEFAULT_ALL)//' \
            -e 's/\.setAutoCancel(true)//' \
            -e 's/\.setPriority(NotificationCompat\.PRIORITY_DEFAULT)//' \
            flutter/android/app/src/main/kotlin/com/carriez/flutter_hbb/MainService.kt
            
      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" \
            ./flutter/android/gradle.properties
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" \
            ./flutter/android/app/build.gradle
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so \
             ./flutter/android/app/src/main/jniLibs/arm64-v8a/
          pushd flutter
          flutter build apk --release --target-platform android-arm64 --split-per-abi
          popd
          mkdir -p signed-apk
          mv ./flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             signed-apk/rustdesk-${{ env.VERSION }}-aarch64.apk

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rustdesk-aarch64.apk
          path: signed-apk/rustdesk-${{ env.VERSION }}-aarch64.apk
